<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summary result</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <div class="cards">

        <!-- card one  -->
        <div class="card-1">
          <h2 class="title">Your Result</h2>
          <div class="circle">
            <p>76 <span>of 100</span></p>
          </div>

          <div class="bottom">
          <h2 
          class="title-2">Great</h2>
          <p class="bott-title">
            You scored higher than 65% of the people who have taken  these tests.
          </p>
          </div>

        </div>

        <!-- card two  -->
        <div class="card-2">
            <h1 class="sum">summary</h1>

            <!-- box -1 -->
           <div class="boxes box-1">
            <div class="box">
                <img src="./images/icon-reaction.svg" alt="">
                <div>
               <p>Reaction</p>

                </div>
            </div>
           <p class="box-score">80 <span class="per">/ 100</span></p>
           </div>


           <!-- box -2  -->
           <div class="boxes box-2">
            <div class="box">
                <img src="./images/icon-memory.svg" alt="">
                <div>
               <p>Memory</p>

                </div>
            </div>
           <p class="box-score"> 92<span class="per">/ 100</span></p>
           </div>

           <!-- box -3  -->
           <div class="boxes box-3">
            <div class="box ">
                <img src="./images/icon-verbal.svg" alt="">
                <div>
               <p>Verbal</p>
                </div>
            </div>
           <p class="box-score">61 <span class="per">/ 100</span></p>
           </div>

           <!-- box -4  -->
           <div class="boxes box-4">
            <div class="box">
                <img src="./images/icon-visual.svg" alt="">
                <div>
               <p>Vision</p>

                </div>
            </div>
           <p class="box-score">73 <span class="per">/ 100</span></p>
           </div>
           <button class="cont">continue</button>
      </div>
    </main>
  </body>
</html>
